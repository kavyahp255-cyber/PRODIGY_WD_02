<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch App</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #7D2Ae8, #ff6b9d);
            margin: 0;
        }
        .wrapper {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            user-select: none;
        }
        .time {
            font-size: 4rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }
        .lap-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 20px;
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
        }
        .lap-item {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }
        button {
            padding: 12px 24px;
            margin: 0 10px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        #start { background: #4CAF50; color: white; }
        #stop { background: #f44336; color: white; }
        #reset { background: #2196F3; color: white; }
        #lap { background: #FF9800; color: white; }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>⏱️ Stopwatch</h1>
        <div class="time" id="display">00:00:00.00</div>
        <div>
            <button id="start">Start</button>
            <button id="stop" disabled>Stop</button>
            <button id="reset" disabled>Reset</button>
            <button id="lap" disabled>Lap</button>
        </div>
        <div class="lap-list" id="laps">
            <div>No laps yet</div>
        </div>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval;
        let isRunning = false;
        let lapCount = 0;
        const display = document.getElementById('display');
        const laps = document.getElementById('laps');

        function updateDisplay() {
            const time = new Date(elapsedTime);
            const minutes = time.getUTCMinutes().toString().padStart(2, '0');
            const seconds = time.getUTCSeconds().toString().padStart(2, '0');
            const centiseconds = Math.floor(time.getUTCMilliseconds() / 10).toString().padStart(2, '0');
            display.textContent = `${minutes}:${seconds}.${centiseconds}`;
        }

        function addLap() {
            lapCount++;
            const lapTime = elapsedTime;
            const lapDiv = document.createElement('div');
            lapDiv.className = 'lap-item';
            lapDiv.textContent = `Lap ${lapCount}: ${new Date(lapTime).toISOString().substr(14, 8)}`;
            laps.insertBefore(lapDiv, laps.firstChild);
        }

        document.getElementById('start').addEventListener('click', () => {
            if (!isRunning) {
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(() => {
                    elapsedTime = Date.now() - startTime;
                    updateDisplay();
                }, 10);
                isRunning = true;
                document.getElementById('start').disabled = true;
                document.getElementById('stop').disabled = false;
                document.getElementById('lap').disabled = false;
            }
        });

        document.getElementById('stop').addEventListener('click', () => {
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                document.getElementById('start').disabled = false;
                document.getElementById('stop').disabled = true;
            }
        });

        document.getElementById('reset').addEventListener('click', () => {
            clearInterval(timerInterval);
            isRunning = false;
            elapsedTime = 0;
            lapCount = 0;
            updateDisplay();
            laps.innerHTML = '<div>No laps yet</div>';
            document.getElementById('start').disabled = false;
            document.getElementById('stop').disabled = true;
            document.getElementById('lap').disabled = true;
            document.getElementById('reset').disabled = true;
        });

        document.getElementById('lap').addEventListener('click', addLap);
    </script>
</body>
</html>
